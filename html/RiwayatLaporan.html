<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riwayat Laporan - U-Find</title>
    <link rel="icon" href="../assets/img/favicon.ico?v=2" type="image/x-icon" />
    <link rel="stylesheet" href="../css/RiwayatLaporan.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper">
      <!-- Navbar (disamakan dengan Dashboard) -->
      <header class="navbar">
        <div class="nav-left">
          <a href="Dashboard.html">
            <img
              src="../assets/img/logo_unikom.png"
              alt="Logo UNIKOM"
              class="nav-logo"
            />
          </a>
          <span class="nav-title">U-Find</span>
        </div>
        <div class="nav-right">
          <div class="profile-menu">
            <button type="button" class="profile-trigger" id="profileTrigger">
              <span class="username" id="usernameLabel">Pengguna</span>
              <i class="fa-solid fa-circle-user profile-icon"></i>
              <i class="fa-solid fa-chevron-down chevron-icon"></i>
            </button>

            <div class="profile-dropdown" id="profileDropdown">
              <a href="Profile.html" class="dropdown-item">
                <i class="fa-regular fa-user"></i>
                <span>Profil Saya</span>
              </a>
              <div class="dropdown-divider"></div>
              <a
                href="../index.html"
                class="dropdown-item dropdown-item-danger"
                id="logoutBtn"
              >
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Keluar</span>
              </a>
            </div>
          </div>
        </div>
      </header>

      <main class="main-content">
        <div class="main-container">
          <!-- Header Halaman -->
          <div class="page-header">
            <a href="Dashboard.html" class="back-btn">
              <i class="fa-solid fa-arrow-left-long"></i>
            </a>
            <h1>Riwayat Laporan Anda</h1>
          </div>

          <!-- Laporan Kehilangan -->
          <section class="riwayat-section">
            <div class="section-title">
              <i class="fa-solid fa-magnifying-glass"></i>
              Laporan Kehilangan
            </div>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th class="col-no">No</th>
                    <th>Waktu</th>
                    <th>Nama Barang</th>
                    <th>Gambar Barang</th>
                    <th>Ciri Barang</th>
                    <th>Lokasi Kejadian</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="kehilanganTableBody">
                  <tr class="state-row">
                    <td colspan="7">
                      <i class="fa-solid fa-spinner fa-spin"></i>
                      Memuat data laporan kehilangan...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>

          <!-- Laporan Temuan -->
          <section class="riwayat-section">
            <div class="section-title">
              <i class="fa-solid fa-box-open"></i>
              Laporan Temuan
            </div>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th class="col-no">No</th>
                    <th>Waktu</th>
                    <th>Nama Barang</th>
                    <th>Gambar Barang</th>
                    <th>Ciri Barang</th>
                    <th>Lokasi Kejadian</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="temuanTableBody">
                  <tr class="state-row">
                    <td colspan="7">
                      <i class="fa-solid fa-spinner fa-spin"></i>
                      Memuat data laporan temuan...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/RiwayatLaporan.js"></script>

    <script>
      const profileTrigger = document.getElementById("profileTrigger");
      const profileDropdown = document.getElementById("profileDropdown");

      profileTrigger.addEventListener("click", (e) => {
        e.stopPropagation();
        profileDropdown.classList.toggle("open");
        profileTrigger.classList.toggle("open");
      });

      document.addEventListener("click", (e) => {
        if (
          !profileDropdown.contains(e.target) &&
          !profileTrigger.contains(e.target)
        ) {
          profileDropdown.classList.remove("open");
          profileTrigger.classList.remove("open");
        }
      });
    </script>
  </body>
</html>
