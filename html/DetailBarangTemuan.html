<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Barang - U-Find</title>
    <link rel="icon" href="../assets/img/favicon.ico?v=2" type="image/x-icon" />
    <link rel="stylesheet" href="../css/DetailBarangTemuan.css" />
    <link rel="stylesheet" href="../css/NotificationHandler.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper">
      <header class="navbar">
        <div class="nav-left">
          <a href="Dashboard.html"
            ><img src="../assets/img/logo_unikom.png" alt="Logo UNIKOM" class="nav-logo"
          /></a>
          <span class="nav-title">U-Find</span>
        </div>
        <div class="nav-right">
          <div class="notification-menu">
            <button type="button" class="notification-trigger" id="notificationTrigger">
              <i class="fa-solid fa-bell"></i>
              <span class="notification-badge" id="notificationBadge"></span>
            </button>
            <div class="notification-dropdown" id="notificationDropdown"></div>
          </div>
          <div class="profile-menu">
            <button type="button" class="profile-trigger" id="profileTrigger">
              <span class="username" id="usernameLabel">Pengguna</span>
              <i class="fa-solid fa-circle-user profile-icon"></i>
              <i class="fa-solid fa-chevron-down chevron-icon"></i>
            </button>
            <div class="profile-dropdown" id="profileDropdown">
              <a href="Profile.html" class="dropdown-item"
                ><i class="fa-regular fa-user"></i> Profil Saya</a
              >
              <div class="dropdown-divider"></div>
              <a href="../index.html" class="dropdown-item dropdown-item-danger" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i> Keluar
              </a>
            </div>
          </div>
        </div>
      </header>

      <main class="main-container">
        <div class="watermark"></div>
        <div class="top-controls">
          <a href="PencarianBarangTemuan.html" class="back-btn"
            ><i class="fa-solid fa-arrow-left-long"></i
          ></a>
        </div>
        <div class="detail-content" id="detailContainer">
          <div class="loading-state">
            <i class="fa-solid fa-spinner fa-spin"></i> Memuat detail barang...
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/SupabaseClient.js"></script>
    <script src="../js/NotificationHandler.js"></script>
    <script src="../js/DetailBarangTemuan.js"></script>
  </body>
</html>
