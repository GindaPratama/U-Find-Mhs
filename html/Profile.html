<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - U-Find</title>
    <link rel="icon" href="../assets/img/favicon.ico?v=2" type="image/x-icon" />
    <link rel="stylesheet" href="../css/Profile.css" />
    <link rel="stylesheet" href="../css/NotificationHandler.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper">
      <!-- NAVBAR -->
      <header class="navbar">
        <div class="nav-left">
          <a href="Dashboard.html">
            <img src="../assets/img/logo_unikom.png" alt="Logo UNIKOM" class="nav-logo" />
          </a>
          <span class="nav-title">U-Find</span>
        </div>
        <div class="nav-right">
          <div class="notification-menu">
            <button type="button" class="notification-trigger" id="notificationTrigger">
              <i class="fa-solid fa-bell"></i>
              <span class="notification-badge" id="notificationBadge"></span>
            </button>
            <div class="notification-dropdown" id="notificationDropdown"></div>
          </div>
          <div class="profile-menu">
            <button type="button" class="profile-trigger" id="profileTrigger">
              <!-- Username ini akan diisi 2 kata nama oleh JS -->
              <span class="username" id="navUsername">Memuat...</span>
              <i class="fa-solid fa-circle-user profile-icon"></i>
              <i class="fa-solid fa-chevron-down chevron-icon"></i>
            </button>
            <div class="profile-dropdown" id="profileDropdown">
              <a href="Profile.html" class="dropdown-item">
                <i class="fa-regular fa-user"></i>
                <span>Profil Saya</span>
              </a>
              <div class="dropdown-divider"></div>
              <a href="#" class="dropdown-item dropdown-item-danger" id="navBtnKeluar">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Keluar</span>
              </a>
            </div>
          </div>
        </div>
      </header>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <div class="profile-card">
          <div class="profile-header">
            <i class="fa-solid fa-circle-user avatar-icon"></i>
            <div class="profile-title">
              <h2 id="profileNamaTop">Memuat...</h2>
              <p>Mahasiswa</p>
            </div>
          </div>

          <div class="profile-grid">
            <!-- NAMA (BISA DIEDIT) -->
            <div class="info-card editable-card">
              <label>NAMA</label>
              <div class="input-wrapper">
                <input type="text" id="inputNama" value="Memuat..." disabled />
                <button type="button" id="btnEditNama" class="btn-edit" title="Edit Nama">
                  <i class="fa-solid fa-pen"></i>
                </button>
              </div>
              <div class="edit-actions hidden" id="actionEditGroup">
                <button type="button" id="btnBatalEdit" class="btn-cancel-sm">Batal</button>
                <button type="button" id="btnSimpanEdit" class="btn-save-sm">Simpan</button>
              </div>
            </div>

            <!-- NIM -->
            <div class="info-card">
              <label>NIM</label>
              <p id="profileNim">-</p>
            </div>

            <!-- NO HP -->
            <div class="info-card">
              <label>NOMER HANDPHONE</label>
              <p id="profileNoHp">-</p>
            </div>

            <!-- EMAIL -->
            <div class="info-card">
              <label>EMAIL UNIKOM</label>
              <p id="profileEmail">-</p>
            </div>
          </div>

          <div class="action-buttons">
            <button type="button" class="btn-keluar" id="btnKeluarUtama">Keluar</button>
            <a href="Dashboard.html" class="btn-kembali">Kembali</a>
          </div>
        </div>
      </main>
    </div>

    <!-- MODAL LOGOUT -->
    <div class="modal-overlay" id="confirmLogoutModal">
      <div class="modal-box modal-box-confirm">
        <div class="modal-icon-outline modal-icon-question">
          <i class="fa-solid fa-question"></i>
        </div>
        <h2>Konfirmasi</h2>
        <p>Apakah anda yakin<br />ingin keluar?</p>
        <div class="modal-actions">
          <button type="button" class="modal-btn-dark" id="confirmYesBtn">Ya</button>
          <button type="button" class="modal-btn-dark" id="confirmNoBtn">Tidak</button>
        </div>
      </div>
    </div>

    <!-- MODAL SUKSES UPDATE NAMA -->
    <div class="modal-overlay" id="successUpdateModal">
      <div class="modal-box modal-box-confirm">
        <div class="modal-icon-outline modal-icon-success">
          <i class="fa-solid fa-check"></i>
        </div>
        <h2>Berhasil</h2>
        <p>Nama berhasil diperbarui.</p>
        <div class="modal-actions" style="justify-content: center">
          <button type="button" class="modal-btn-dark" id="successOkBtn" style="max-width: 150px">
            OK
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/SupabaseClient.js"></script>
    <script src="../js/NotificationHandler.js"></script>
    <script src="../js/Profile.js"></script>
  </body>
</html>
