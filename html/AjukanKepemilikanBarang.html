<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajukan Kepemilikan Barang - U-Find</title>
    <link rel="icon" href="../assets/img/favicon.ico?v=2" type="image/x-icon" />
    <link rel="stylesheet" href="../css/AjukanKepemilikanBarang.css" />
    <link rel="stylesheet" href="../css/NotificationHandler.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper">
      <header class="navbar">
        <div class="nav-left">
          <a href="Dashboard.html">
            <img src="../assets/img/logo_unikom.png" alt="Logo UNIKOM" class="nav-logo" />
          </a>
          <span class="nav-title">U-Find</span>
        </div>
        <div class="nav-right">
          <div class="notification-menu">
            <button type="button" class="notification-trigger" id="notificationTrigger">
              <i class="fa-solid fa-bell"></i>
              <span class="notification-badge" id="notificationBadge"></span>
            </button>
            <div class="notification-dropdown" id="notificationDropdown"></div>
          </div>
          <div class="profile-menu">
            <button type="button" class="profile-trigger" id="profileTrigger">
              <span class="username" id="usernameLabel">...</span>
              <i class="fa-solid fa-circle-user profile-icon"></i>
              <i class="fa-solid fa-chevron-down chevron-icon"></i>
            </button>
            <div class="profile-dropdown" id="profileDropdown">
              <a href="Profile.html" class="dropdown-item">
                <i class="fa-regular fa-user"></i> Profil Saya
              </a>
              <div class="dropdown-divider"></div>
              <a href="../index.html" class="dropdown-item dropdown-item-danger" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i> Keluar
              </a>
            </div>
          </div>
        </div>
      </header>

      <main class="main-content">
        <div class="form-container">
          <div class="form-header">
            <h2>Upload Bukti Kepemilikan Barang!</h2>
          </div>
          <form id="klaimForm">
            <div class="input-group">
              <label>Upload Foto Bukti</label>
              <label for="bukti_foto" class="upload-area" id="uploadDropzone">
                <span class="upload-placeholder" id="placeholderText"
                  >Masukan Foto Bukti Kepemilikan Barang atau KTM Anda</span
                >
                <i class="fa-solid fa-upload upload-icon"></i>
              </label>
              <input type="file" id="bukti_foto" accept="image/*" hidden />
            </div>

            <div class="input-group">
              <label>Apakah klaim ini berkaitan dengan Laporan Kehilangan Anda?</label>
              <!-- Dropdown akan diisi otomatis dari JS -->
              <select id="laporanSelect" name="laporan_kehilangan">
                <option value="">Memuat data...</option>
              </select>
            </div>

            <div class="action-buttons">
              <button type="button" class="btn-secondary" onclick="history.back()">Kembali</button>
              <button type="submit" class="btn-primary" id="submitBtn">Kirim Pengajuan</button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/SupabaseClient.js"></script>
    <script src="../js/NotificationHandler.js"></script>
    <script src="../js/AjukanKepemilikanBarang.js"></script>
  </body>
</html>
