<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajukan Kepemilikan Barang - U-Find</title>
    <link rel="icon" href="../assets/img/favicon.ico?v=2" type="image/x-icon" />
    <link rel="stylesheet" href="../css/AjukanKepemilikanBarang.css" />
    <!-- Menggunakan FontAwesome untuk Icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-wrapper">
      <!-- Navbar (disamakan dengan halaman lain) -->
      <header class="navbar">
        <div class="nav-left">
          <a href="Dashboard.html">
            <img
              src="../assets/img/logo_unikom.png"
              alt="Logo UNIKOM"
              class="nav-logo"
            />
          </a>
          <span class="nav-title">U-Find</span>
        </div>
        <div class="nav-right">
          <span class="username">Pengguna</span>
          <a href="Profile.html" style="color: white; text-decoration: none">
            <i class="fa-solid fa-circle-user profile-icon"></i>
          </a>
        </div>
      </header>

      <main class="main-content">
        <div class="form-container">
          <div class="form-header">
            <h2>Upload Bukti Kepemilikan Barang Anda!</h2>
            <a href="DetailBarangTemuan.html" class="close-btn"
              ><i class="fa-solid fa-xmark"></i
            ></a>
          </div>

          <form>
            <div class="input-group">
              <label>Upload Foto</label>
              <label for="bukti_foto" class="upload-area">
                <span class="upload-placeholder"
                  >Masukan Foto Bukti Kepemilikan Barang atau KTM Anda</span
                >
                <i class="fa-solid fa-upload upload-icon"></i>
              </label>
              <input
                type="file"
                id="bukti_foto"
                name="bukti_foto"
                accept="image/*"
                hidden
              />
            </div>

            <div class="input-group">
              <label
                >Apakah klaim ini berkaitan dengan Laporan Kehilangan Anda
                sebelumnya?</label
              >
              <select name="laporan_kehilangan">
                <option value="" selected disabled>
                  -- Pilih Laporan Kehilangan Anda --
                </option>
                <option value="LH-001">LH-001 - Handphone</option>
                <option value="LH-002">LH-002 - Topi</option>
                <option value="LH-003">LH-003 - Kunci Motor</option>
                <option value="tidak">
                  Tidak Ada / Bukan Barang Saya yang Hilang
                </option>
              </select>
            </div>

            <div class="action-buttons">
              <a href="DetailBarangTemuan.html" class="btn-secondary"
                >Kembali</a
              >
              <button type="submit" class="btn-primary">Kirim</button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <script src="../js/AjukanKepemilikanBarang.js"></script>
    <script src="../js/SupabaseClient.js"></script>
  </body>
</html>
