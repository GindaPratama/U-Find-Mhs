<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrasi - U-Find</title>
    <link rel="stylesheet" href="../css/Registrasi.css" />
    <link rel="icon" href="../assets/img/favicon.ico?v=2" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="register-container">
      <div class="brand-section">
        <img
          src="../assets/img/logo_unikom.png"
          alt="Logo UNIKOM"
          class="logo"
        />
        <h1>U-Find</h1>
        <p>TRUST UR HEART, TRUST U-Find</p>
      </div>

      <div class="form-section">
        <div class="register-card">
          <div class="user-icon"></div>
          <!-- REVISI: Menggunakan ID agar bisa ditangkap oleh JavaScript -->
          <form id="registerForm">
            <div class="input-group">
              <label for="nim">NIM</label>
              <input
                type="text"
                id="nim"
                name="nim"
                placeholder="Masukkan NIM"
                required
              />
            </div>

            <div class="input-group">
              <label for="nama">Nama Lengkap</label>
              <input
                type="text"
                id="nama"
                name="nama"
                placeholder="Masukkan Nama Lengkap"
                required
              />
            </div>

            <div class="input-group">
              <label for="email">Email UNIKOM</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Masukkan Alamat Email UNIKOM"
                required
              />
            </div>

            <div class="input-group">
              <label for="password">Password</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Masukkan Password"
                  required
                />
                <i class="fa-regular fa-eye" id="togglePassword"></i>
              </div>
            </div>

            <div class="input-group">
              <label for="nohp">No HP</label>
              <input
                type="tel"
                id="nohp"
                name="nohp"
                placeholder="Masukkan No HP"
                required
              />
            </div>

            <div class="action-buttons">
              <a href="../index.html" class="btn-secondary">Kembali</a>
              <!-- REVISI: Mengubah tag <a> menjadi <button type="submit"> -->
              <button type="submit" class="btn-primary">Daftar</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Modal Sukses Registrasi (pengganti alert bawaan browser) -->
    <div class="modal-overlay" id="successModal">
      <div class="modal-box">
        <div class="modal-icon">
          <img
            src="../assets/img/terimakasih.png"
            alt="Terima kasih sudah mendaftar"
          />
        </div>
        <h2 id="modalTitle">Terima kasih sudah melakukan registrasi akun</h2>
        <p id="modalMessage">
          Silahkan cek email Anda untuk melakukan aktivasi akun.
        </p>
        <button type="button" class="btn-primary modal-btn" id="modalOkBtn">
          Mengerti
        </button>
      </div>
    </div>

    <script src="../js/Registrasi.js"></script>
    <script src="../js/SupabaseClient.js"></script>
  </body>
</html>
