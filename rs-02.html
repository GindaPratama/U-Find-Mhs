<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ubah Password - U-Find</title>
    <link rel="stylesheet" href="assets/css/rs-02.css" />
    <link rel="icon" href="assets/img/favicon.ico?v=2" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="reset-container">
      <div class="brand-section">
        <img src="assets/img/logo_unikom.png" alt="Logo UNIKOM" class="logo" />
        <h1>U-Find</h1>
        <p>TRUST UR HEART, TRUST U-Find</p>
      </div>

      <div class="form-section">
        <div class="reset-card">
          <div class="user-icon"></div>

          <form action="index.html" method="POST">
            <div class="input-group">
              <label for="new_password">Password Baru</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="new_password"
                  name="new_password"
                  placeholder="Masukkan Password Baru"
                  required
                />
                <i
                  class="fa-regular fa-eye toggle-password"
                  data-target="new_password"
                ></i>
              </div>
            </div>

            <div class="input-group">
              <label for="confirm_password">Konfirmasi Password</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="confirm_password"
                  name="confirm_password"
                  placeholder="Masukkan Konfirmasi Password"
                  required
                />
                <i
                  class="fa-regular fa-eye toggle-password"
                  data-target="confirm_password"
                ></i>
              </div>
            </div>

            <div class="action-buttons">
              <a href="rs-01.html" class="btn-secondary">Kembali</a>
              <a href="index.html" class="btn-primary">Kirim</a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="assets/js/rs-02.js"></script>
  </body>
</html>
